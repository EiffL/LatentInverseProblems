robustness:
  alpha_sweep_nonlinear:
    note: "Calibrated at all alpha with adaptive zeta ≈ 1.0 + 0.2·alpha"
    results:
      - { alpha: 0.0, zeta: 1.1, hpd_mean: 0.514, hpd_ks: 0.072 }
      - { alpha: 0.5, zeta: 1.2, hpd_mean: 0.492, hpd_ks: 0.081 }
      - { alpha: 1.0, zeta: 1.3, hpd_mean: 0.501, hpd_ks: 0.039 }
      - { alpha: 1.5, zeta: 1.4, hpd_mean: 0.489, hpd_ks: 0.068 }

  alpha_sweep_folded:

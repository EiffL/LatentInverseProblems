project:
  name: "Calibrated Posterior Sampling for Latent Inverse Problems"
  iterations: 17
  date: "2026-03-11"
  status: "SUCCESS — all criteria met"

breakthrough:
  method: "Latent MMPS"
  description: >
    Moment-Matching Posterior Sampling extended to latent space.
    Propagates Tweedie covariance through the decoder Jacobian:
    Σ_y = σ_n²I + V_t · J_D · J_D^T.
    Uses push-through identity for efficiency (d_latent×d_latent solve).
  default_zeta: 1.1
  default_steps: 200
  cost_vs_dps: "4.7×"
  implementation: "lip/solvers/latent_mmps.py"

success_criteria:
  nonlinear_decoder_2d:
    alpha: 0.5
    hpd_mean: 0.482
    hpd_ks: 0.056
    target_hpd_mean: "[0.45, 0.55]"
    target_hpd_ks: "< 0.10"
    passed: true
  folded_decoder_2d:
    alpha: 1.0
    hpd_mean: 0.453
    hpd_ks: 0.092
    target_hpd_mean: "[0.45, 0.55]"
    target_hpd_ks: "< 0.10"
    passed: true
  cost_limit:
    max_ratio: 10.0
    actual_ratio: 4.7
    passed: true


    results:
      - { seed: 0,   nl_hpd: 0.525, f_hpd: 0.493 }
      - { seed: 42,  nl_hpd: 0.510, f_hpd: 0.494 }
      - { seed: 123, nl_hpd: 0.464, f_hpd: 0.455 }

failed_hypotheses:
  - name: "H3: LATINO+SDE"
    result: "SDE denoiser makes LATINO worse in latent space"
  - name: "H4: Split Gibbs"
    result: "OK on unimodal, fails on bimodal (trapped in one mode)"
  - name: "H5: SMC (post-hoc SIR)"
    result: "Importance resampling collapses diversity"
  - name: "H14: Latent LFlow"
    result: "ODE works on unimodal but no single zeta for both problems"

novelty:
  literature_search: "2026-03-11"
  finding: >
    No prior work combines MMPS-style Tweedie covariance with decoder
    Jacobian propagation for calibrated latent posterior sampling.
  closest_works:
    - "STSL (CVPR 2024): 2nd-order Tweedie, reconstruction focus, no calibration"
    - "C-DPS (NeurIPS 2025): coupled dynamics, not Jacobian-aware"
    - "LD-SMC (ICML 2025): formal convergence but needs many particles"

next_steps:
  - "Scale to learned decoders (VAE/Stable Diffusion) via autodiff Jacobians"
  - "Replace exact scores with trained score networks"
  - "Higher dimensions: Woodbury identity already implemented for d_pixel >> d_latent"
  - "Theory: derive optimal zeta as function of decoder curvature (Jensen gap)"
  - "Paper: Latent MMPS is a novel contribution"
